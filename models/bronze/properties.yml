version: 2

models:
    - name: bronze_appointments
      config: 
        materialized: table
        schema: bronze
      columns:
        - name: appt_id
          tests:
            - unique
            - not_null
        - name: fee
          tests:
            - accepted_values:
                arguments:
                  values: [0-5000]
                config:
                  severity: warn

    - name: bronze_doctors
      config: 
        materialized: table
        schema: bronze
    
    - name: bronze_patients
      config: 
        materialized: table
        schema: bronze
